  <text x="620" y="340" font-family="Arial,sans-serif" font-size="120" font-weight="900" fill="white" letter-spacing="-4">MALTY</text>
  <text x="620" y="400" font-family="Arial,sans-serif" font-size="28" font-weight="500" fill="#6a8cba" letter-spacing="8">CREATION DE SITES WEB</text>
