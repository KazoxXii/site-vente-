<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0070ff"/>
      <stop offset="50%" stop-color="#0055dd"/>
      <stop offset="100%" stop-color="#003399"/>
    </linearGradient>
    <linearGradient id="m-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cce0ff"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="12" stdDeviation="30" flood-color="#0070ff" flood-opacity="0.5"/>
    </filter>
    <filter id="inner-light">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#ffffff" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Background rounded square with border -->
  <rect x="20" y="20" width="360" height="360" rx="88" fill="#080808"/>
  <rect x="24" y="24" width="352" height="352" rx="84" fill="url(#bg)" filter="url(#glow)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.06">
    <line x1="60" y1="20" x2="60" y2="380" stroke="#fff" stroke-width="0.5"/>
    <line x1="100" y1="20" x2="100" y2="380" stroke="#fff" stroke-width="0.5"/>
    <line x1="140" y1="20" x2="140" y2="380" stroke="#fff" stroke-width="0.5"/>
    <line x1="180" y1="20" x2="180" y2="380" stroke="#fff" stroke-width="0.5"/>
    <line x1="220" y1="20" x2="220" y2="380" stroke="#fff" stroke-width="0.5"/>
    <line x1="260" y1="20" x2="260" y2="380" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="20" x2="300" y2="380" stroke="#fff" stroke-width="0.5"/>
    <line x1="340" y1="20" x2="340" y2="380" stroke="#fff" stroke-width="0.5"/>
  </g>
  <!-- Shine top-left -->
  <ellipse cx="120" cy="100" rx="160" ry="120" fill="#ffffff" opacity="0.08"/>
  <!-- M monogram stylé -->
  <text x="200" y="262" font-family="'Space Grotesk', 'Inter', Arial, sans-serif" font-size="240" font-weight="900" fill="url(#m-grad)" text-anchor="middle" letter-spacing="-20" filter="url(#inner-light)">M</text>
  <!-- Accent dot -->
  <circle cx="290" cy="95" r="8" fill="#ffffff" opacity="0.9"/>
</svg>
