<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Merci — MALTY</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:#0a0a0f; color:#fff; font-family:'Inter',sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
    .card { max-width:480px; padding:48px 32px; }
    .icon { font-size:4rem; margin-bottom:24px; }
    h1 { font-size:2rem; font-weight:800; margin-bottom:12px; letter-spacing:-0.03em; }
    p { color:#888; font-size:1rem; line-height:1.7; margin-bottom:32px; }
    .btn { display:inline-block; padding:14px 32px; background:#0066ff; color:#fff; border-radius:10px; text-decoration:none; font-weight:700; transition:all .3s; }
    .btn:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(0,102,255,0.3); }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>Merci pour votre commande !</h1>
    <p>Votre paiement a bien été reçu. Je vous envoie un email de confirmation dans les prochaines minutes avec les détails de votre pack.</p>
    <a href="https://maltyshop.vercel.app/" class="btn">Retour au site</a>
  </div>
