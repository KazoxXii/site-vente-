<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:1200; height:900; overflow:hidden; font-family:'Inter',sans-serif; }
    .card {
      width:1200px; height:900px;
      background:linear-gradient(135deg, #0a0a0f 0%, #1a0a2e 100%);
      display:flex; flex-direction:column; justify-content:center; align-items:center;
      position:relative; overflow:hidden;
    }
    .glow { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:800px; height:800px; background:radial-gradient(circle, rgba(168,85,247,0.08) 0%, transparent 60%); }
    .grid-bg { position:absolute; inset:0; background-image:linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px); background-size:60px 60px; }
    .content { position:relative; z-index:1; text-align:center; padding:60px; width:100%; }
    .badge { display:inline-block; background:rgba(168,85,247,0.1); color:#a855f7; font-size:12px; font-weight:700; padding:6px 16px; border-radius:100px; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:24px; }
    h1 { font-size:44px; font-weight:900; color:#fff; letter-spacing:-0.04em; line-height:1.05; margin-bottom:40px; }
    h1 span { color:#a855f7; }
    .portfolio { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; max-width:1000px; margin:0 auto; }
    .project { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); border-radius:14px; overflow:hidden; text-align:left; }
    .project-visual { height:120px; display:flex; align-items:center; justify-content:center; }
    .project-visual.v1 { background:linear-gradient(135deg, #0066ff22, #0066ff08); }
    .project-visual.v2 { background:linear-gradient(135deg, #ff880022, #ff880008); }
    .project-visual.v3 { background:linear-gradient(135deg, #00c87822, #00c87808); }
    .project-icon { font-size:2.5rem; }
    .project-body { padding:16px 20px; }
    .project-name { font-size:14px; font-weight:700; color:#fff; margin-bottom:4px; }
    .project-type { font-size:11px; color:#666; }
    .bottom { position:absolute; bottom:0; left:0; right:0; padding:20px 60px; border-top:1px solid rgba(255,255,255,0.06); background:rgba(0,0,0,0.3); display:flex; justify-content:space-between; align-items:center; }
    .bottom span { font-size:12px; color:#555; }
    .bottom strong { color:#888; }
  </style>
</head>
<body>
  <div class="card">
    <div class="glow"></div>
    <div class="grid-bg"></div>
    <div class="content">
      <div class="badge"> Réalisations</div>
      <h1>Des sites qui <span>convertissent.</span></h1>
      <div class="portfolio">
        <div class="project">
          <div class="project-visual v1"><div class="project-icon">⚡</div></div>
          <div class="project-body">
            <div class="project-name">Digital Flow</div>
            <div class="project-type">Agence digitale · Site vitrine</div>
          </div>
        </div>
        <div class="project">
          <div class="project-visual v2"><div class="project-icon">🍷</div></div>
          <div class="project-body">
            <div class="project-name">Mario Consulting</div>
            <div class="project-type">Cabinet de conseil · Site vitrine</div>
          </div>
        </div>
        <div class="project">
          <div class="project-visual v3"><div class="project-icon">🌿</div></div>
          <div class="project-body">
            <div class="project-name">Shop Eco</div>
            <div class="project-type">E-commerce · Boutique en ligne</div>
          </div>
        </div>
      </div>
    </div>
    <div class="bottom">
      <span><strong>maltyshop.vercel.app</strong> · Lyon, France</span>
      <span>50+ sites livrés · 100% satisfaction</span>
    </div>
  </div>
</body>
</html>
