<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="leftFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="30%" stop-color="#38bdf8"/>
      <stop offset="70%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="leftFront" x1="0%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" stop-color="#bae6fd"/>
      <stop offset="25%" stop-color="#7dd3fc"/>
      <stop offset="60%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="rightFace" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="30%" stop-color="#0ea5e9"/>
      <stop offset="70%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0369a1"/>
    </linearGradient>
    <linearGradient id="rightFront" x1="100%" y1="0%" x2="20%" y2="100%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="25%" stop-color="#38bdf8"/>
      <stop offset="60%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#0284c7"/>
    </linearGradient>
    <linearGradient id="centerDeep" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#0c4a6e"/>
      <stop offset="50%" stop-color="#082f49"/>
      <stop offset="100%" stop-color="#0c1929"/>
    </linearGradient>
    <linearGradient id="centerLeft" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>
    <linearGradient id="topShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#bae6fd" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="edgeShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="innerShadow">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#001020" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Ambient glow -->
  <ellipse cx="256" cy="256" rx="200" ry="220" fill="#0ea5e9" opacity="0.08"/>
  
  <!-- LEFT LEG - side face (darker) -->
  <polygon points="60,440 60,120 190,60 256,190 190,270 60,330" fill="url(#leftFace)"/>
  
  <!-- LEFT LEG - front face (brighter) -->
  <polygon points="60,120 190,60 220,130 90,185" fill="url(#leftFront)" opacity="0.85"/>
  
  <!-- LEFT LEG - top highlight -->
  <polygon points="60,120 190,60 200,85 75,140" fill="url(#topShine)"/>
  
  <!-- RIGHT LEG - side face (darker) -->
  <polygon points="452,440 452,120 322,60 256,190 322,270 452,330" fill="url(#rightFace)"/>
  
  <!-- RIGHT LEG - front face (brighter) -->
  <polygon points="452,120 322,60 292,130 422,185" fill="url(#rightFront)" opacity="0.8"/>
  
  <!-- RIGHT LEG - top highlight -->
  <polygon points="452,120 322,60 312,85 437,140" fill="url(#topShine)" opacity="0.7"/>
  
  <!-- CENTER VALLEY - deep dark -->
  <polygon points="190,270 256,190 322,270 256,400" fill="url(#centerDeep)"/>
  
  <!-- CENTER VALLEY - left slope -->
  <polygon points="190,270 256,190 256,300" fill="url(#centerLeft)" opacity="0.7"/>
  
  <!-- CENTER VALLEY - right slope highlight -->
  <polygon points="322,270 256,190 256,280" fill="#0ea5e9" opacity="0.25"/>
  
  <!-- Top edge highlights -->
  <line x1="60" y1="120" x2="190" y2="60" stroke="#e0f2fe" stroke-width="2.5" opacity="0.45"/>
  <line x1="452" y1="120" x2="322" y2="60" stroke="#e0f2fe" stroke-width="2.5" opacity="0.35"/>
  <line x1="190" y1="60" x2="256" y2="190" stroke="#bae6fd" stroke-width="1.8" opacity="0.3"/>
  <line x1="322" y1="60" x2="256" y2="190" stroke="#bae6fd" stroke-width="1.8" opacity="0.25"/>
  
  <!-- Inner reflections -->
  <polygon points="70,140 180,78 195,100 85,158" fill="#bae6fd" opacity="0.12"/>
  <polygon points="442,140 332,78 317,100 427,158" fill="#bae6fd" opacity="0.1"/>
  
  <!-- Bottom shadow -->
  <ellipse cx="256" cy="450" rx="140" ry="20" fill="#0ea5e9" opacity="0.1"/>
</svg>
