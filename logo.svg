<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 60" width="200" height="60">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0070ff"/>
      <stop offset="100%" stop-color="#0056cc"/>
    </linearGradient>
    <filter id="g">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#0070ff" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Abstract M monogram -->
  <rect x="0" y="0" width="44" height="44" rx="12" fill="url(#g)"/>
  <text x="22" y="32" font-family="'Space Grotesk', Arial, sans-serif" font-size="26" font-weight="900" fill="#fff" text-anchor="middle" letter-spacing="-1">M</text>
  <!-- MALTY text -->
  <text x="60" y="30" font-family="'Space Grotesk', Arial, sans-serif" font-size="28" font-weight="800" fill="#ffffff" letter-spacing="-1.5">MALTY</text>
  <!-- Dot -->
  <circle cx="169" cy="14" r="4" fill="#0070ff" filter="url(#g)"/>
  <!-- Tagline -->
  <text x="60" y="48" font-family="'Inter', Arial, sans-serif" font-size="9" font-weight="500" fill="#aaaaaa" letter-spacing="3">DÉVELOPPEUR WEB</text>
</svg>
